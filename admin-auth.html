<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة المشرفين | Online Koshk</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/admin.css">
</head>
<body class="admin-auth-body">

    <div class="auth-container-lux">
        <div class="auth-logo-lux">
            <i class="fas fa-user-shield"></i>
            <h2>بوابة الإدارة الرقمية</h2>
            <span>Online Koshk Control Panel</span>
        </div>

        <div class="auth-tabs-lux">
            <button class="auth-tab-lux active" onclick="switchTab('login')">تسجيل الدخول</button>
            <button class="auth-tab-lux" onclick="switchTab('register')">طلب صلاحية أدمن</button>
        </div>

        <form id="loginForm">
            <div class="form-group-lux">
                <label>البريد الإلكتروني للمشرف</label>
                <div class="input-wrapper-lux">
                    <input type="email" id="loginEmail" placeholder="admin@onlinekoshk.com" required>
                    <i class="fas fa-envelope"></i>
                </div>
            </div>
            <div class="form-group-lux">
                <label>مفتاح التشفير / كلمة المرور</label>
                <div class="input-wrapper-lux">
                    <input type="password" id="loginPassword" placeholder="••••••••" required>
                    <i class="fas fa-lock"></i>
                </div>
            </div>
            <button type="submit" class="submit-btn-lux">ولوج آمن لوحة التحكم</button>
        </form>

        <form id="registerForm" style="display: none;">
            <div class="form-group-lux">
                <label>الاسم بالكامل</label>
                <div class="input-wrapper-lux">
                    <input type="text" id="regName" placeholder="أدخل اسمك الثلاثي" required>
                    <i class="fas fa-user"></i>
                </div>
            </div>
            <div class="form-group-lux">
                <label>البريد الإلكتروني الرسمي</label>
                <div class="input-wrapper-lux">
                    <input type="email" id="regEmail" placeholder="username@onlinekoshk.com" required>
                    <i class="fas fa-envelope"></i>
                </div>
            </div>
            <div class="form-group-lux">
                <label>كود دعوة الإدارة (Admin Invite Code)</label>
                <div class="input-wrapper-lux">
                    <input type="text" id="regInvite" placeholder="أدخل كود التحقق الإداري" required>
                    <i class="fas fa-key"></i>
                </div>
            </div>
            <div class="form-group-lux">
                <label>إنشاء كلمة مرور لوحة التحكم</label>
                <div class="input-wrapper-lux">
                    <input type="password" id="regPassword" placeholder="أنشئ كلمة مرور قوية" required>
                    <i class="fas fa-lock"></i>
                </div>
            </div>
            <button type="submit" class="submit-btn-lux">إرسال طلب الانضمام للسيستم</button>
        </form>

        <div class="security-notice-lux">
            <i class="fas fa-exclamation-triangle"></i>
            <p>منطقة مشفرة ومراقبة أمنياً. يتم التحقق من الصلاحيات والمزامنة الحية مع قواعد البيانات لحماية المتجر.</p>
        </div>
    </div>

    <script type="module">
        import { auth, db } from './js/firebase-config.js';
        import { signInWithEmailAndPassword, signOut, setPersistence, browserSessionPersistence } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { collection, addDoc, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // نظام إشعارات توست فاخر لصفحة دخول الأدمن متناسق مع التصميم الداكن
        window.showToast = function(message, type = 'success') {
            let container = document.getElementById('adminAuthToastContainer');
            if (!container) {
                container = document.createElement('div');
                container.id = 'adminAuthToastContainer';
                container.style.position = 'fixed';
                container.style.bottom = '30px';
                container.style.left = '30px';
                container.style.zIndex = '10000';
                container.style.display = 'flex';
                container.style.flexDirection = 'column';
                container.style.gap = '10px';
                container.style.pointerEvents = 'none';
                document.body.appendChild(container);
            }
            
            const toast = document.createElement('div');
            toast.className = 'koshk-auth-toast-lux';
            toast.style.background = type === 'success' ? '#1e293b' : '#ef4444';
            toast.style.color = type === 'success' ? '#ff9900' : '#ffffff';
            toast.style.border = type === 'success' ? '1px solid rgba(255, 153, 0, 0.2)' : '1px solid rgba(239, 68, 68, 0.2)';
            toast.style.padding = '14px 24px';
            toast.style.borderRadius = '8px';
            toast.style.boxShadow = '0 10px 25px rgba(0,0,0,0.2)';
            toast.style.fontFamily = "'Cairo', sans-serif";
            toast.style.fontSize = '14px';
            toast.style.fontWeight = '700';
            toast.style.display = 'flex';
            toast.style.alignItems = 'center';
            toast.style.gap = '10px';
            toast.style.opacity = '0';
            toast.style.transform = 'translateY(20px)';
            toast.style.transition = 'all 0.4s cubic-bezier(0.4, 0, 0.2, 1)';
            toast.style.direction = 'rtl';
            toast.style.pointerEvents = 'auto';
            
            const icon = document.createElement('i');
            icon.className = type === 'success' ? 'fas fa-check-circle' : 'fas fa-exclamation-circle';
            toast.appendChild(icon);
            
            const textEl = document.createElement('span');
            textEl.innerText = message;
            toast.appendChild(textEl);
            
            container.appendChild(toast);
            
            setTimeout(() => {
                toast.style.opacity = '1';
                toast.style.transform = 'translateY(0)';
            }, 50);
            
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateY(-20px)';
                setTimeout(() => { toast.remove(); }, 400);
            }, 3500);
        };

        window.switchTab = function(tab) {
            const loginForm = document.getElementById('loginForm');
            const registerForm = document.getElementById('registerForm');
            const tabs = document.querySelectorAll('.auth-tab-lux');
            tabs.forEach(t => t.classList.remove('active'));
            if(tab === 'login') {
                loginForm.style.display = 'block';
                registerForm.style.display = 'none';
                tabs[0].classList.add('active');
            } else {
                loginForm.style.display = 'none';
                registerForm.style.display = 'block';
                tabs[1].classList.add('active');
            }
        }

        document.getElementById('loginForm').onsubmit = async (e) => {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value;
            const submitBtn = e.target.querySelector('.submit-btn-lux');
            const originalBtnText = submitBtn.textContent;
            submitBtn.disabled = true;
            submitBtn.textContent = 'جاري التحقق الأمني...';
            try {
                // 1) ضبط الجلسة لتنتهي عند غلق المتصفح أو التبويب
                await setPersistence(auth, browserSessionPersistence);

                // 2) تسجيل الدخول في Firebase Auth
                let cred;
                try {
                    cred = await signInWithEmailAndPassword(auth, email, password);
                } catch (authError) {
                    // Check Firestore active_staff custom password bypass
                    const q = query(collection(db, "active_staff"), where("email", "==", email));
                    const s = await getDocs(q);
                    if (!s.empty) {
                        const staffData = s.docs[0].data();
                        if (staffData.password && staffData.password === password) {
                            cred = await signInWithEmailAndPassword(auth, email, "KoshkSecureAuthBypass100%");
                        } else {
                            throw authError;
                        }
                    } else {
                        throw authError;
                    }
                }

                // 3) التحقق أن المستخدم مسجل ضمن active_staff مع دور صالح
                let snap = await getDocs(query(collection(db, "active_staff"), where("uid", "==", cred.user.uid)));
                if (snap.empty) {
                    snap = await getDocs(query(collection(db, "active_staff"), where("email", "==", email)));
                }

                if (snap.empty) {
                    await signOut(auth);
                    window.showToast('الحساب غير مصرح له بالدخول للوحة التحكم. تواصل مع المالك لتفعيل صلاحياتك.', 'error');
                    submitBtn.disabled = false;
                    submitBtn.textContent = originalBtnText;
                    return;
                }

                const staffData = snap.docs[0].data();
                const allowedRoles = ['owner', 'admin', 'manager', 'staff', 'moderator'];
                const isActive = staffData.status ? staffData.status === 'active' : true;
                if (!isActive || (staffData.role && !allowedRoles.includes(staffData.role))) {
                    await signOut(auth);
                    window.showToast('حسابك موقوف أو دوره غير مصرح له بالدخول. راجع مالك النظام.', 'error');
                    submitBtn.disabled = false;
                    submitBtn.textContent = originalBtnText;
                    return;
                }

                window.showToast('تم التحقق الأمني بنجاح! جاري توجيهك للوحة التحكم...', 'success');
                setTimeout(() => {
                    window.location.href = 'adminelkoshk.html';
                }, 1000);
            } catch (error) {
                console.error(error);
                window.showToast('فشل تسجيل الدخول: تأكد من البريد وكلمة المرور، أو من موافقة المالك.', 'error');
                submitBtn.disabled = false;
                submitBtn.textContent = originalBtnText;
            }
        };

        document.getElementById('registerForm').onsubmit = async (e) => {
            e.preventDefault();
            try {
                await addDoc(collection(db, "pending_staff"), {
                    name: document.getElementById('regName').value,
                    email: document.getElementById('regEmail').value,
                    inviteCode: document.getElementById('regInvite').value,
                    password: document.getElementById('regPassword').value,
                    status: "pending",
                    requestedAt: new Date()
                });
                window.showToast('تم إرسال طلب الصلاحية، في انتظار تفعيل محمد سعيد لحسابك.', 'success');
                window.switchTab('login');
            } catch (error) {
                window.showToast('حدث خطأ أثناء إرسال طلب الصلاحية: ' + error.message, 'error');
            }
        };
    </script>
</body>
</html>
