<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول / حساب جديد - أونلاين كشك</title>
    <!-- Bootstrap 5 RTL -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <!-- Google Fonts - Cairo -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <!-- Custom CSS -->
    <link href="css/style.css" rel="stylesheet">
    <link href="css/responsive.css" rel="stylesheet">
</head>
<body class="d-flex flex-column min-vh-100 justify-content-between">

    <!-- الناف بار الرفيعة والمحميّة -->
    <header class="navbar navbar-expand-lg bg-white sticky-top py-1 border-bottom shadow-sm nav-glass-blur">
        <div class="container px-lg-4">
            <a class="navbar-brand d-flex align-items-center me-0 py-0" href="index.html">
                <img src="images/logo.png" alt="أونلاين كشك" height="38" class="me-2" style="border: none !important; box-shadow: none !important; background: transparent !important;" onerror="this.src='https://cdn-icons-png.flaticon.com/512/3514/3514491.png'">
                <div class="d-flex flex-column text-start ms-2">
                    <span class="fw-extrabold fs-5 lh-1 text-purple">أونلاين كشك</span>
                    <small class="text-muted fs-8">أفضل العروض، عمولات أفضل</small>
                </div>
            </a>
            <a href="index.html" class="btn btn-purple-soft btn-sm rounded-pill px-3 fw-bold">
                <i class="bi bi-house me-1"></i> العودة للرئيسية
            </a>
        </div>
    </header>

    <!-- كارت تسجيل الدخول وإنشاء الحساب -->
    <main class="my-auto py-5">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-md-8 col-lg-5">
                    <div class="frameless-section-box p-4 p-md-5 rounded-5 shadow-subtle-glow bg-white position-relative overflow-hidden">
                        
                        <!-- التبويب العلوي (Tabs) -->
                        <ul class="nav nav-pills nav-justified mb-4 p-1 rounded-pill bg-light border border-purple-subtle" id="authTabs" role="tablist">
                            <li class="nav-item" role="presentation">
                                <button class="nav-link active rounded-pill fw-bold fs-7 py-2" id="login-tab" data-bs-toggle="pill" data-bs-target="#login-panel" type="button" role="tab">تسجيل الدخول</button>
                            </li>
                            <li class="nav-item" role="presentation">
                                <button class="nav-link rounded-pill fw-bold fs-7 py-2" id="register-tab" data-bs-toggle="pill" data-bs-target="#register-panel" type="button" role="tab">حساب جديد</button>
                            </li>
                        </ul>

                        <!-- تنبيهات الأخطاء والنجاح -->
                        <div id="authAlert" class="alert d-none fs-8 rounded-4 text-center mb-3" role="alert"></div>

                        <div class="tab-content" id="authTabsContent">
                            
                            <!-- 1. نموذج تسجيل الدخول -->
                            <div class="tab-pane fade show active" id="login-panel" role="tabpanel">
                                <div class="text-center mb-4">
                                    <h5 class="fw-extrabold text-dark mb-1">مرحباً بك مجدداً 👋</h5>
                                    <small class="text-muted fs-8">أدخل بريدك الإلكتروني وكلمة المرور لمتابعة أرباحك</small>
                                </div>
                                <form id="loginForm">
                                    <div class="mb-3">
                                        <label class="form-label fs-8 fw-bold text-dark">البريد الإلكتروني</label>
                                        <div class="input-group input-group-sm rounded-pill overflow-hidden search-input-glow">
                                            <span class="input-group-text bg-transparent border-0 pe-3"><i class="bi bi-envelope text-purple"></i></span>
                                            <input type="email" id="loginEmail" class="form-control border-0 bg-transparent text-end fs-7 py-2 shadow-none" placeholder="example@domain.com" required>
                                        </div>
                                    </div>
                                    <div class="mb-3">
                                        <label class="form-label fs-8 fw-bold text-dark">كلمة المرور</label>
                                        <div class="input-group input-group-sm rounded-pill overflow-hidden search-input-glow">
                                            <span class="input-group-text bg-transparent border-0 pe-3"><i class="bi bi-lock text-purple"></i></span>
                                            <input type="password" id="loginPassword" class="form-control border-0 bg-transparent text-end fs-7 py-2 shadow-none" placeholder="••••••••" required>
                                        </div>
                                    </div>

                                    <!-- إضافة خيار "تذكرني" المباشر -->
                                    <div class="d-flex align-items-center justify-content-between mb-3 px-2">
                                        <div class="form-check text-end mb-0">
                                            <input class="form-check-input float-end ms-2" type="checkbox" id="userRememberMe" checked>
                                            <label class="form-check-label fs-8 text-muted fw-semibold" for="userRememberMe">تذكرني على هذا الجهاز</label>
                                        </div>
                                    </div>

                                    <button type="submit" id="loginBtn" class="btn btn-purple-pill w-100 py-2 rounded-pill fw-bold text-white shadow-purple-glow mt-2 fs-7">
                                        تسجيل الدخول <i class="bi bi-box-arrow-in-left ms-1"></i>
                                    </button>
                                </form>
                            </div>

                            <!-- 2. نموذج إنشاء حساب جديد -->
                            <div class="tab-pane fade" id="register-panel" role="tabpanel">
                                <div class="text-center mb-4">
                                    <h5 class="fw-extrabold text-dark mb-1">انضم إلى أونلاين كشك 🚀</h5>
                                    <small class="text-muted fs-8">ابدأ التسويق بالعمولة واكسب أرباح فورية</small>
                                </div>
                                <form id="registerForm">
                                    <div class="mb-3">
                                        <label class="form-label fs-8 fw-bold text-dark">الاسم بالكامل</label>
                                        <div class="input-group input-group-sm rounded-pill overflow-hidden search-input-glow">
                                            <span class="input-group-text bg-transparent border-0 pe-3"><i class="bi bi-person text-purple"></i></span>
                                            <input type="text" id="regFullName" class="form-control border-0 bg-transparent text-end fs-7 py-2 shadow-none" placeholder="الاسم الثلاثي" required>
                                        </div>
                                    </div>
                                    <div class="mb-3">
                                        <label class="form-label fs-8 fw-bold text-dark">رقم الموبايل (فودافون كاش / إنستا باي)</label>
                                        <div class="input-group input-group-sm rounded-pill overflow-hidden search-input-glow">
                                            <span class="input-group-text bg-transparent border-0 pe-3"><i class="bi bi-phone text-purple"></i></span>
                                            <input type="tel" id="regPhone" class="form-control border-0 bg-transparent text-end fs-7 py-2 shadow-none" placeholder="010xxxxxxxx" required>
                                        </div>
                                    </div>
                                    <div class="mb-3">
                                        <label class="form-label fs-8 fw-bold text-dark">البريد الإلكتروني</label>
                                        <div class="input-group input-group-sm rounded-pill overflow-hidden search-input-glow">
                                            <span class="input-group-text bg-transparent border-0 pe-3"><i class="bi bi-envelope text-purple"></i></span>
                                            <input type="email" id="regEmail" class="form-control border-0 bg-transparent text-end fs-7 py-2 shadow-none" placeholder="example@domain.com" required>
                                        </div>
                                    </div>
                                    <div class="mb-3">
                                        <label class="form-label fs-8 fw-bold text-dark">كلمة المرور</label>
                                        <div class="input-group input-group-sm rounded-pill overflow-hidden search-input-glow">
                                            <span class="input-group-text bg-transparent border-0 pe-3"><i class="bi bi-lock text-purple"></i></span>
                                            <input type="password" id="regPassword" class="form-control border-0 bg-transparent text-end fs-7 py-2 shadow-none" placeholder="••••••••" minlength="6" required>
                                        </div>
                                    </div>
                                    <button type="submit" id="regBtn" class="btn btn-purple-pill w-100 py-2 rounded-pill fw-bold text-white shadow-purple-glow mt-2 fs-7">
                                        إنشاء الحساب مجاناً <i class="bi bi-person-plus ms-1"></i>
                                    </button>
                                </form>
                            </div>

                        </div>

                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- الفوتر البسيط -->
    <footer class="footer bg-white border-top py-3 text-center text-muted fs-8">
        <p class="mb-0">&copy; 2026 أونلاين كشك. جميع الحقوق محفوظة</p>
    </footer>

    <!-- Bootstrap JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Supabase JS Library -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- Supabase Config & Auth JS -->
    <script src="js/supabase-config.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
