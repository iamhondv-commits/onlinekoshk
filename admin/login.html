<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل دخول الأدمن والمالك - أونلاين كشك</title>
    <!-- Bootstrap 5 RTL -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <!-- Google Fonts - Cairo -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <!-- Custom CSS & Responsive -->
    <link href="../css/style.css" rel="stylesheet">
    <link href="../css/responsive.css" rel="stylesheet">
    <link href="css/admin-style.css" rel="stylesheet">
    <link href="css/admin-responsive.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center justify-content-center min-vh-100 py-4">

    <div class="container" style="max-width: 480px;">
        <!-- اللوجو والهيدر -->
        <div class="text-center mb-4">
            <a href="../index.html" class="d-inline-flex align-items-center text-decoration-none mb-2">
                <img src="../images/logo.png" alt="أونلاين كشك" height="45" class="me-2" onerror="this.src='https://cdn-icons-png.flaticon.com/512/3514/3514491.png'">
                <span class="fw-extrabold fs-3 text-purple">أونلاين كشك</span>
            </a>
            <p class="text-muted fs-8 fw-bold">بوابة تسجيل دخول المالك ولوحة التحكم الرئيسية 🛡️</p>
        </div>

        <!-- كارت التسجيل والدخول -->
        <div class="card border-0 rounded-4 shadow-sm p-4 bg-white">
            
            <!-- تبويبات الاختيار (دخول / إنشاء حساب أدمن) -->
            <ul class="nav nav-pills nav-justified mb-4 p-1 bg-light rounded-pill border" id="adminAuthTabs" role="tablist">
                <li class="nav-item" role="presentation">
                    <button class="nav-link active rounded-pill fw-bold fs-8 py-2" id="admin-login-tab" data-bs-toggle="pill" data-bs-target="#admin-login-pane" type="button" role="tab">
                        تسجيل دخول الأدمن
                    </button>
                </li>
                <li class="nav-item" role="presentation">
                    <button class="nav-link rounded-pill fw-bold fs-8 py-2" id="admin-reg-tab" data-bs-toggle="pill" data-bs-target="#admin-reg-pane" type="button" role="tab">
                        إنشاء حساب مالك جديد
                    </button>
                </li>
            </ul>

            <!-- صندوق التنبيهات -->
            <div id="adminAuthAlert" class="alert d-none fs-8 rounded-3 text-center mb-3"></div>

            <div class="tab-content" id="adminAuthTabContent">
                
                <!-- 1. نموذج تسجيل دخول الأدمن -->
                <div class="tab-pane fade show active" id="admin-login-pane" role="tabpanel">
                    <form id="adminLoginForm">
                        <div class="mb-3">
                            <label class="form-label fs-8 fw-bold text-dark">البريد الإلكتروني للـ Admin</label>
                            <div class="input-group">
                                <span class="input-group-text bg-light border-end-0 text-muted"><i class="bi bi-shield-lock"></i></span>
                                <input type="email" id="adminLoginEmail" class="form-control text-end border-start-0" placeholder="admin@domain.com" required>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fs-8 fw-bold text-dark">كلمة السر</label>
                            <div class="input-group">
                                <span class="input-group-text bg-light border-end-0 text-muted"><i class="bi bi-key"></i></span>
                                <input type="password" id="adminLoginPassword" class="form-control text-end border-start-0" placeholder="••••••••" required>
                            </div>
                        </div>

                        <!-- إضافة خيار "تذكرني" المباشر للأدمن -->
                        <div class="d-flex align-items-center justify-content-between mb-4 px-1">
                            <div class="form-check text-end mb-0">
                                <input class="form-check-input float-end ms-2" type="checkbox" id="adminRememberMe" checked>
                                <label class="form-check-label fs-8 text-muted fw-semibold" for="adminRememberMe">تذكرني على هذا الجهاز</label>
                            </div>
                        </div>

                        <button type="submit" id="adminLoginBtn" class="btn btn-purple-pill w-100 py-2 rounded-pill fw-bold text-white shadow-purple-glow fs-8 mb-2">
                            دخول لوحة التحكم <i class="bi bi-box-arrow-in-right ms-1"></i>
                        </button>
                    </form>
                </div>

                <!-- 2. نموذج إنشاء حساب أدمن جديد -->
                <div class="tab-pane fade" id="admin-reg-pane" role="tabpanel">
                    <form id="adminRegisterForm">
                        <div class="mb-3">
                            <label class="form-label fs-8 fw-bold text-dark">اسم المالك / الأدمن</label>
                            <input type="text" id="adminRegName" class="form-control text-end" placeholder="اكتب اسمك هنا" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fs-8 fw-bold text-dark">البريد الإلكتروني للأدمن</label>
                            <input type="email" id="adminRegEmail" class="form-control text-end" placeholder="admin@domain.com" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fs-8 fw-bold text-dark">كلمة السر (6 أرقام/حروف على الأقل)</label>
                            <input type="password" id="adminRegPassword" class="form-control text-end" placeholder="••••••••" required minlength="6">
                        </div>

                        <div class="mb-4">
                            <label class="form-label fs-8 fw-bold text-dark">كود تفعيل صلاحية الأدمن السرية (Admin Key)</label>
                            <input type="password" id="adminSecretKey" class="form-control text-center fw-bold" placeholder="أدخل كود الأدمن الخاص بك" required>
                            <small class="text-muted fs-9 d-block mt-1 text-center">الكود المعتمد لإنشاء أدمن هو: <strong class="text-purple">honda2026</strong></small>
                        </div>

                        <button type="submit" id="adminRegBtn" class="btn btn-purple-pill w-100 py-2 rounded-pill fw-bold text-white shadow-purple-glow fs-8">
                            تأكيد وإنشاء حساب الأدمن <i class="bi bi-check-circle ms-1"></i>
                        </button>
                    </form>
                </div>

            </div>

        </div>

        <div class="text-center mt-3">
            <a href="../index.html" class="text-muted text-decoration-none fs-8"><i class="bi bi-arrow-right me-1"></i> العودة للرئيسية للموقع</a>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Supabase JS Library -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- Config & Admin Auth Script -->
    <script src="../js/supabase-config.js"></script>
    <script src="js/admin-auth.js"></script>
</body>
</html>
